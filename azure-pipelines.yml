# FluentUI2CSS Build Pipeline
# Azure DevOps Pipeline for FluentUI2CSS Solution
# Organization: https://dev.azure.com/Easybyte/

variables:
- name: BuildParameters.RestoreBuildProjects
  value: '**/*.csproj'
- name: BuildConfiguration
  value: 'Release'
  
name: $(date:yyyyMMdd)$(rev:.r)

jobs:
- job: Build_FluentUI2CSS
  displayName: 'Build FluentUI2CSS'
  pool:
    name: Azure Pipelines
    vmImage: 'windows-latest'
  
  steps:
  - checkout: self
    fetchDepth: 1
    
  - task: UseDotNet@2
    displayName: 'Use .NET SDK 10.0.x'
    inputs:
      packageType: 'sdk'
      version: '10.0.x'
      
  - task: DotNetCoreCLI@2
    displayName: 'Restore NuGet packages'
    inputs:
      command: restore
      projects: $(BuildParameters.RestoreBuildProjects)
      verbosityRestore: Detailed
      
  - task: DotNetCoreCLI@2
    displayName: 'Build solution'
    inputs:
      command: build
      projects: $(BuildParameters.RestoreBuildProjects)
      arguments: '--configuration $(BuildConfiguration) --no-restore'
      
  - task: DotNetCoreCLI@2
    displayName: 'Pack FluentUI2CSS NuGet'
    inputs:
      command: pack
      packagesToPack: 'src/FluentUI2CSS/FluentUI2CSS.csproj'
      nobuild: true
      configuration: $(BuildConfiguration)
      versioningScheme: byEnvVar
      versionEnvVar: Build.BuildNumber
      
  - task: NuGetCommand@2
    displayName: 'Push to Easybyte Feed'
    inputs:
      command: push
      packagesToPush: '$(Build.ArtifactStagingDirectory)/**/*.nupkg'
      nuGetFeedType: 'internal'
      publishVstsFeed: '6a994941-bfae-42c1-94e1-aef4a75798dc/f2edafe3-8566-414f-adb1-3251590f8a38'
      allowPackageConflicts: false
